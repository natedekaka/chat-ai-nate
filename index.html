<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat AI Llama</title>
    <style>
        :root {
            --bg-body: #f5f5f5;
            --bg-header: linear-gradient(90deg, #1a1a1a 0%, #333 100%);
            --bg-chat: #fff;
            --text-header: #fff;
            --msg-user-bg: #1a1a1a;
            --msg-user-color: #fff;
            --msg-bot-bg: #e8e8e8;
            --msg-bot-color: #1a1a1a;
            --input-bg: #f0f0f0;
            --input-color: #000;
            --btn-bg: #1a1a1a;
            --btn-color: #fff;
            --footer-bg: #f9f9f9;
            --footer-color: #888;
            --border-color: #eee;
            --code-bg: #eee;
        }
        .msg.bot code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-family: monospace; display: inline-block; }
        .msg.bot a { color: #1a73e8; text-decoration: none; }
        .msg.bot a:hover { text-decoration: underline; }
        
        .color-picker {
            position: absolute;
            left: 15px;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .color-picker label { font-size: 14px; color: #fff; margin-right: 5px; }
        .color-picker input[type="color"] {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
        }
        .dark {
            --bg-body: #121212;
            --bg-header: linear-gradient(90deg, #2d2d2d 0%, #444 100%);
            --bg-chat: #1a1a1a;
            --text-header: #fff;
            --msg-user-bg: #4a4a4a;
            --msg-user-color: #fff;
            --msg-bot-bg: #2d2d2d;
            --msg-bot-color: #e0e0e0;
            --input-bg: #2d2d2d;
            --input-color: #fff;
            --btn-bg: #4a4a4a;
            --btn-color: #fff;
            --footer-bg: #1a1a1a;
            --footer-color: #666;
            --border-color: #333;
            --code-bg: #333;
        }
        .dark code { background: #333 !important; }
        .dark .color-picker label { color: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-body); 
            color: #000;
            display: flex; 
            flex-direction: column; 
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            transition: background 0.3s;
        }
        header { 
            background: var(--bg-header);
            color: var(--text-header);
            padding: 14px 15px; 
            text-align: center; 
            font-size: 17px; 
            font-weight: 600;
            z-index: 100;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.3px;
            transition: background 0.3s;
        }
        header .logo { font-size: 22px; }
        header .theme-btn {
            position: absolute;
            right: 15px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }
        
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 12px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px;
            background: var(--bg-chat);
            -webkit-overflow-scrolling: touch;
            transition: background 0.3s;
        }
        
        .msg { 
            padding: 10px 14px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            line-height: 1.5;
            font-size: 15px;
            position: relative;
            white-space: pre-wrap;
        }
        .msg.user { 
            background: var(--msg-user-bg);
            color: var(--msg-user-color);
            align-self: flex-end;
            max-width: 80%;
            border-radius: 20px 20px 4px 20px;
        }
        .msg.bot { 
            background: var(--msg-bot-bg);
            color: var(--msg-bot-color);
            align-self: flex-start;
            max-width: 80%;
            border-radius: 20px 20px 20px 4px;
        }
        
        .copy-btn, .clear-btn {
            display: block;
            background: transparent;
            border: none;
            color: #666;
            font-size: 11px;
            padding: 2px 0;
            cursor: pointer;
            opacity: 0;
            margin-top: 2px;
        }
        .msg.bot:hover .copy-btn { opacity: 1; }
        
        .input-area { 
            background: var(--bg-chat); 
            padding: 12px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex; 
            gap: 10px; 
            align-items: center;
            flex-shrink: 0;
            z-index: 100;
            border-top: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
        }
        input { 
            flex: 1; 
            padding: 12px 16px; 
            border: none; 
            border-radius: 24px; 
            background: var(--input-bg); 
            color: var(--input-color); 
            outline: none;
            font-size: 15px;
            transition: background 0.3s, color 0.3s;
        }
        input::placeholder { color: #999; }
        button { 
            background: var(--btn-bg);
            color: var(--btn-color);
            border: none; 
            padding: 12px 20px; 
            border-radius: 24px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.2px;
            transition: background 0.3s, color 0.3s;
        }
        button:disabled { opacity: 0.5; }
        button:active { transform: scale(0.96); }
        
        .loading { 
            padding: 10px 14px;
            color: #999; 
            font-size: 14px;
        }
        .typing {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        footer { 
            background: var(--footer-bg); 
            padding: 8px; 
            text-align: center; 
            font-size: 11px; 
            color: var(--footer-color);
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            transition: background 0.3s, color 0.3s;
        }
        footer button {
            background: transparent;
            color: var(--footer-color);
            padding: 4px 8px;
            font-size: 11px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); }
            40% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <header>
        <div class="color-picker">
            <label>🎨</label>
            <input type="color" id="colorPicker" value="#1a1a1a" onchange="saveColor()">
        </div>
        <span class="logo">✨</span>
        <span>AI CHAT NATEDEKAKA</span>
        <span style="font-size:11px;opacity:0.8">(FREE)</span>
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </header>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msg" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter')send()">
        <button id="sendBtn" onclick="send()">Kirim</button>
    </div>
    <footer>
        <button onclick="clearChat()">🗑️ Hapus Chat</button>
        <span>by natedekaka</span>
    </footer>

    <script>
        const key = String.fromCharCode(103,115,107,95,110,82,78,88,109,54,52,65,84,98,110,74,85,70,102,67,81,111,78,103,87,71,100,121,98,51,70,89,120,57,51,116,73,110,101,100,49,53,83,54,108,77,89,55,90,88,77,80,51,49,108,113);
        const MODEL = "llama-3.3-70b-versatile";
        const URL = "https://api.groq.com/openai/v1/chat/completions";
        
        let isDark = localStorage.getItem('darkMode') === 'true';
        let botColor = localStorage.getItem('botColor') || '#1a1a1a';
        
        function init() {
            if (isDark) document.body.classList.add('dark');
            document.getElementById('colorPicker').value = botColor;
            document.documentElement.style.setProperty('--msg-bot-color', botColor);
            const chat = document.getElementById('chat');
            const history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
            if (history.length > 0) {
                history.forEach(msg => addMessage(msg.text, msg.isUser));
            } else {
                addMessage("Halo! Saya AI Assistant natedekaka.\nGratis untuk semua!\n\nKetik pesan untuk mulai chat...", false);
            }
        }
        
        function saveColor() {
            botColor = document.getElementById('colorPicker').value;
            document.documentElement.style.setProperty('--msg-bot-color', botColor);
            localStorage.setItem('botColor', botColor);
        }

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
            document.querySelector('.theme-btn').textContent = isDark ? '☀️' : '🌙';
        }

        function saveHistory() {
            const messages = [];
            document.querySelectorAll('.msg').forEach(el => {
                messages.push({ text: el.childNodes[0].textContent, isUser: el.classList.contains('user') });
            });
            localStorage.setItem('chatHistory', JSON.stringify(messages));
        }
        
        function clearChat() {
            if (!confirm('Hapus semua chat?')) return;
            document.getElementById('chat').innerHTML = '';
            localStorage.removeItem('chatHistory');
            addMessage("Chat dihapus.\n\nKetik pesan untuk mulai chat baru...", false);
        }

        function formatText(text) {
            text = text.replace(/\n{3,}/g, '\n\n');
            text = text.trim();
            return text;
        }
        
        function renderMarkdown(text) {
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            text = text.replace(/`(.+?)`/g, '<code>$1</code>');
            text = text.replace(/```[\s\S]*?```/g, m => '<code style="display:block;background:#eee;padding:8px;border-radius:4px;white-space:pre;">' + m.replace(/```|```/g, '') + '</code>');
            text = text.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            text = text.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
            return text;
        }
        
        function addMessage(text, isUser, skipSave = false) {
            const div = document.createElement("div");
            div.className = "msg " + (isUser ? "user" : "bot");
            
            if (!isUser) {
                text = formatText(text);
            }
            
            if (isUser) {
                div.textContent = text;
            } else {
                div.innerHTML = renderMarkdown(text);
                const copyBtn = document.createElement("button");
                copyBtn.className = "copy-btn";
                copyBtn.textContent = "📋 Copy";
                copyBtn.onclick = function() {
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.textContent = "✓ Copied!";
                        setTimeout(() => copyBtn.textContent = "📋 Copy", 1500);
                    });
                };
                div.appendChild(copyBtn);
            }
            
            document.getElementById("chat").appendChild(div);
            if (!skipSave) saveHistory();
            setTimeout(() => {
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            }, 100);
        }
        
        function showTyping() {
            const chat = document.getElementById('chat');
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span';
            chat.appendChild(typing);
            setTimeout(() => chat.scrollTop = chat.scrollHeight, 100);
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function send() {
            const input = document.getElementById("msg");
            const btn = document.getElementById("sendBtn");
            const text = input.value.trim();
            if (!text) return;

            input.value = "";
            btn.disabled = true;
            addMessage(text, true);

            showTyping();

            try {
                const res = await fetch(URL, {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: MODEL, messages: [{ role: "system", content: "Kamu adalah NATEDEKAKA AI, asisten AI buatan natedekaka. Jika ditanya siapa kamu, jawab bahwa kamu adalah NATEDEKAKA AI.\n\nInformasi keluarga natedekaka: Sudah berkeluarga. Istri bernama LILIS SURYANI. Memiliki 3 anak:\n1. Rachmat Ramadhan (panggilan: RAM)\n2. Alikha Noviyanti Putri\n3. Albarr Rafisqy" }, { role: "user", content: text + "\n\nJawab dalam bahasa Indonesia." }], temperature: 0.5, max_completion_tokens: 2048 })
                });
                hideTyping();
                if (res.ok) {
                    const data = await res.json();
                    addMessage(data.choices[0].message.content, false);
                } else {
                    addMessage("Error: " + res.statusText, false);
                }
            } catch (e) {
                hideTyping();
                addMessage("Error: " + e.message, false);
            }
            btn.disabled = false;
            input.focus();
            setTimeout(() => {
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            }, 100);
        }

        init();
    </script>
</body>
</html>

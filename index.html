<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat AI Llama</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f5f5f5; 
            color: #000;
            display: flex; 
            flex-direction: column; 
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        header { 
            background: linear-gradient(90deg, #1a1a1a 0%, #333 100%);
            color: #fff;
            padding: 14px 15px; 
            text-align: center; 
            font-size: 17px; 
            font-weight: 600;
            z-index: 100;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }
        header .logo { font-size: 22px; }
        
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 12px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px;
            background: #fff;
            -webkit-overflow-scrolling: touch;
        }
        
        .msg { 
            padding: 10px 14px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            line-height: 1.4;
            font-size: 15px;
            position: relative;
        }
        .msg.user { 
            background: #1a1a1a;
            color: #fff;
            align-self: flex-end;
            max-width: 80%;
            border-radius: 20px 20px 4px 20px;
        }
        .msg.bot { 
            background: #e8e8e8;
            color: #1a1a1a;
            align-self: flex-start;
            max-width: 80%;
            border-radius: 20px 20px 20px 4px;
        }
        
        .copy-btn {
            display: block;
            background: transparent;
            border: none;
            color: #666;
            font-size: 11px;
            padding: 2px 0;
            cursor: pointer;
            opacity: 0;
            margin-top: 2px;
        }
        .msg.bot:hover .copy-btn { opacity: 1; }
        
        .input-area { 
            background: #fff; 
            padding: 12px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex; 
            gap: 10px; 
            align-items: center;
            flex-shrink: 0;
            z-index: 100;
            border-top: 1px solid #eee;
        }
        input { 
            flex: 1; 
            padding: 12px 16px; 
            border: none; 
            border-radius: 24px; 
            background: #f0f0f0; 
            color: #000; 
            outline: none;
            font-size: 15px;
        }
        input::placeholder { color: #999; }
        button { 
            background: #1a1a1a;
            color: #fff;
            border: none; 
            padding: 12px 20px; 
            border-radius: 24px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.2px;
        }
        button:disabled { opacity: 0.5; }
        button:active { transform: scale(0.96); }
        
        .loading { 
            padding: 10px; 
            color: #999; 
            font-size: 14px;
        }
        footer { 
            background: #f9f9f9; 
            padding: 8px; 
            text-align: center; 
            font-size: 11px; 
            color: #888;
            flex-shrink: 0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <span class="logo">✨</span>
        <span>AI CHAT NATEDEKAKA</span>
        <span style="font-size:11px;opacity:0.8">(FREE)</span>
    </header>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msg" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter')send()">
        <button id="sendBtn" onclick="send()">Kirim</button>
    </div>
    <footer>by natedekaka</footer>

    <script>
        const key = String.fromCharCode(103,115,107,95,110,82,78,88,109,54,52,65,84,98,110,74,85,70,102,67,81,111,78,103,87,71,100,121,98,51,70,89,120,57,51,116,73,110,101,100,49,53,83,54,108,77,89,55,90,88,77,80,51,49,108,113);
        const MODEL = "llama-3.3-70b-versatile";
        const URL = "https://api.groq.com/openai/v1/chat/completions";

        function init() {
            addMessage("Halo! Saya AI Assistant Llama.\nGratis untuk semua!\n\nKetik pesan untuk mulai chat...", false);
        }

        function addMessage(text, isUser) {
            const div = document.createElement("div");
            div.className = "msg " + (isUser ? "user" : "bot");
            div.textContent = text;
            
            if (!isUser) {
                const copyBtn = document.createElement("button");
                copyBtn.className = "copy-btn";
                copyBtn.textContent = "📋 Copy";
                copyBtn.onclick = function() {
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.textContent = "✓ Copied!";
                        setTimeout(() => copyBtn.textContent = "📋 Copy", 1500);
                    });
                };
                div.appendChild(copyBtn);
            }
            
            document.getElementById("chat").appendChild(div);
            setTimeout(() => {
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            }, 100);
        }

        async function send() {
            const input = document.getElementById("msg");
            const btn = document.getElementById("sendBtn");
            const text = input.value.trim();
            if (!text) return;

            input.value = "";
            btn.disabled = true;
            addMessage(text, true);

            const loading = document.createElement("div");
            loading.className = "loading";
            loading.textContent = "Mengirim...";
            document.getElementById("chat").appendChild(loading);
            
            setTimeout(() => {
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            }, 100);

            try {
                const res = await fetch(URL, {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: MODEL, messages: [{ role: "user", content: text + "\n\nJawab dalam bahasa Indonesia." }], temperature: 0.5, max_completion_tokens: 2048 })
                });
                loading.remove();
                if (res.ok) {
                    const data = await res.json();
                    addMessage(data.choices[0].message.content, false);
                } else {
                    addMessage("Error: " + res.statusText, false);
                }
            } catch (e) {
                loading.remove();
                addMessage("Error: " + e.message, false);
            }
            btn.disabled = false;
            input.focus();
            setTimeout(() => {
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            }, 100);
        }

        init();
    </script>
</body>
</html>

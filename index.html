<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Chat AI Llama - natedekaka</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(180deg, #1a1a2e 0%, #2d1b4e 50%, #1a1a2e 100%); 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        header { 
            background: linear-gradient(135deg, #6c5ce7 0%, #8e44ad 100%); 
            padding: 12px 15px; 
            text-align: center; 
            font-size: 16px; 
            font-weight: bold;
            box-shadow: 0 2px 15px rgba(108, 92, 231, 0.5);
            z-index: 100;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        header .logo { font-size: 20px; }
        header .brand { color: #ffd700; }
        header .tagline { font-size: 11px; color: #ddd; font-weight: normal; }
        
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .message { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user { 
            background: linear-gradient(135deg, #3498db, #2980b9); 
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
        }
        .bot { 
            background: linear-gradient(135deg, #2c3e50, #34495e); 
            align-self: flex-start; 
            border-bottom-left-radius: 4px;
        }
        .input-area { 
            background: linear-gradient(0deg, #2d1b4e 0%, #1a1a2e 100%); 
            padding: 12px 15px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex; 
            gap: 10px; 
            align-items: center;
            box-shadow: 0 -2px 15px rgba(108, 92, 231, 0.3);
            flex-shrink: 0;
            z-index: 100;
        }
        input { 
            flex: 1; 
            padding: 14px 18px; 
            border: none; 
            border-radius: 25px; 
            background: #2d1b4e; 
            color: #fff; 
            outline: none;
            font-size: 15px;
            border: 1px solid #6c5ce7;
        }
        input::placeholder { color: #aaa; }
        button { 
            background: linear-gradient(135deg, #e94560, #c0392b); 
            color: #fff; 
            border: none; 
            padding: 14px 22px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(233, 69, 96, 0.4);
        }
        button:disabled { opacity: 0.5; }
        button:active { transform: scale(0.95); }
        .loading { 
            text-align: center; 
            padding: 10px; 
            color: #888; 
            font-size: 14px;
        }
        .message-container {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .message-container.user {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message-container.bot {
            align-self: flex-start;
            align-items: flex-start;
        }
        .message { 
            padding: 12px 16px; 
            border-radius: 18px; 
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        .message.user { 
            background: linear-gradient(135deg, #8e44ad, #9b59b6); 
            border-bottom-right-radius: 4px;
        }
        .message.bot { 
            background: linear-gradient(135deg, #6c5ce7, #a29bfe); 
            border-bottom-left-radius: 4px;
            color: #fff;
        }
        .copy-btn {
            background: transparent;
            border: none;
            color: #888;
            font-size: 12px;
            padding: 4px 8px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            margin-top: 4px;
        }
        .message-container:hover .copy-btn {
            opacity: 1;
        }
        .copy-btn:active { color: #e94560; }
        footer { 
            background: linear-gradient(135deg, #2d1b4e 0%, #1a1a2e 100%); 
            padding: 8px; 
            text-align: center; 
            font-size: 11px; 
            color: #a29bfe;
            flex-shrink: 0;
        }
        .copy-btn {
            background: transparent;
            border: none;
            color: #a29bfe;
            font-size: 12px;
            padding: 4px 8px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <header>
        <span class="logo">🤖</span>
        <span>Chat AI Llama</span>
        <span class="brand">by natedekaka</span>
    </header>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msg" placeholder="Tulis pesan..." onkeypress="if(event.key==='Enter')send()">
        <button id="sendBtn" onclick="send()">Kirim</button>
    </div>
    <footer>by natedekaka 2026</footer>

    <script>
        const key = String.fromCharCode(103,115,107,95,110,82,78,88,109,54,52,65,84,98,110,74,85,70,102,67,81,111,78,103,87,71,100,121,98,51,70,89,120,57,51,116,73,110,101,100,49,53,83,54,108,77,89,55,90,88,77,80,51,49,108,113);
        const MODEL = "llama-3.3-70b-versatile";
        const URL = "https://api.groq.com/openai/v1/chat/completions";

        function init() {
            addMessage("Halo! Saya AI Assistant Llama.\nGratis untuk semua! by natedekaka\n\nKetik pesan untuk mulai chat...", false);
        }

        function addMessage(text, isUser) {
            const container = document.createElement("div");
            container.className = "message-container " + (isUser ? "user" : "bot");
            
            const msgDiv = document.createElement("div");
            msgDiv.className = "message " + (isUser ? "user" : "bot");
            msgDiv.textContent = text;
            container.appendChild(msgDiv);
            
            if (!isUser) {
                const copyBtn = document.createElement("button");
                copyBtn.className = "copy-btn";
                copyBtn.textContent = "📋 Copy";
                copyBtn.onclick = function() {
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.textContent = "✓ Copied!";
                        setTimeout(() => copyBtn.textContent = "📋 Copy", 1500);
                    });
                };
                container.appendChild(copyBtn);
            }
            
            document.getElementById("chat").appendChild(container);
            setTimeout(() => {
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            }, 100);
        }

        async function send() {
            const input = document.getElementById("msg");
            const btn = document.getElementById("sendBtn");
            const text = input.value.trim();
            if (!text) return;

            input.value = "";
            btn.disabled = true;
            addMessage(text, true);

            const loading = document.createElement("div");
            loading.className = "loading";
            loading.textContent = "Mengirim...";
            document.getElementById("chat").appendChild(loading);
            
            setTimeout(() => {
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            }, 100);

            try {
                const res = await fetch(URL, {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: MODEL, messages: [{ role: "user", content: text + "\n\nJawab dalam bahasa Indonesia." }], temperature: 0.5, max_completion_tokens: 2048 })
                });
                loading.remove();
                if (res.ok) {
                    const data = await res.json();
                    addMessage(data.choices[0].message.content, false);
                } else {
                    addMessage("Error: " + res.statusText, false);
                }
            } catch (e) {
                loading.remove();
                addMessage("Error: " + e.message, false);
            }
            btn.disabled = false;
            input.focus();
            setTimeout(() => {
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            }, 100);
        }

        init();
    </script>
</body>
</html>
